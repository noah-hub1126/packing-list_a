<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>패킹리스트 — 그로잉업</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#0f0f14;--s1:#1a1a24;--s2:#22222e;--border:#2c2c3e;--accent:#7c6ffd;--accent2:#a78bfa;--text:#efeffa;--muted:#7070a0;--ok:#34d399;--warn:#f87171;--r:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.hd{padding:18px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.hd-date{margin-left:auto;display:flex;flex-direction:column;gap:6px;}
.date-lbl{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.5px;}
.date-row{display:flex;gap:8px;align-items:center;}
.cal-wrap{display:flex;align-items:center;gap:8px;padding:7px 13px;background:var(--s2);border:1.5px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .13s;position:relative;}
.cal-wrap:hover{border-color:var(--accent);}
.date-input-hidden{position:absolute;opacity:0;width:0;height:0;pointer-events:none;}
.date-display{font-size:13px;color:var(--text);white-space:nowrap;min-width:100px;}
.date-input-text{padding:7px 11px;background:var(--s2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;outline:none;width:140px;}
.date-input-text:focus{border-color:var(--accent);}
.date-input-text::placeholder{color:var(--muted);}
.hd-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:17px;}
.hd-title{font-size:16px;font-weight:700;}
.hd-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.layout{display:grid;grid-template-columns:240px 300px 1fr;min-height:calc(100vh - 73px);}
.panel{border-right:1px solid var(--border);padding:20px 16px;overflow-y:auto;}
.panel:last-child{border-right:none;}
.ptitle{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.group-block{margin-bottom:18px;}
.group-name{font-size:15px;font-weight:700;color:var(--accent2);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.group-name::before{content:"";width:3px;height:16px;background:var(--accent);border-radius:2px;display:inline-block;}
.prod-list{display:flex;flex-direction:column;gap:4px;}
.pbtn{background:var(--s1);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;cursor:pointer;text-align:left;color:var(--text);font-family:inherit;font-size:14px;font-weight:500;transition:all .14s;width:100%;}
.pbtn:hover{border-color:var(--accent);background:rgba(124,111,253,.08);}
.pbtn.on{border-color:var(--accent);background:rgba(124,111,253,.18);font-weight:700;color:#fff;}
.opt-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--muted);gap:8px;text-align:center;font-size:13px;line-height:1.8;}
.sel-name{font-size:18px;font-weight:700;margin-bottom:4px;}
.sel-group{font-size:12px;color:var(--muted);margin-bottom:20px;}
.opt-section{margin-bottom:18px;}
.opt-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:9px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:30px;font-size:13px;border:1.5px solid var(--border);background:var(--s2);color:#b0b0cc;cursor:pointer;font-family:inherit;font-weight:500;transition:all .13s;white-space:nowrap;}
.chip:hover{border-color:var(--accent2);color:var(--text);}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
.dot{width:9px;height:9px;border-radius:50%;border:1px solid rgba(255,255,255,.25);flex-shrink:0;}
.cinput{display:flex;gap:5px;margin-top:8px;}
.cinput input{flex:1;padding:7px 11px;background:var(--s2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;outline:none;}
.cinput input:focus{border-color:var(--accent);}
.cinput input::placeholder{color:var(--muted);}
.cinput button{padding:7px 12px;background:var(--s2);border:1.5px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap;}
.cinput button:hover{border-color:var(--accent);color:var(--text);}
.mbox{border-radius:10px;padding:11px 13px;font-size:12px;line-height:1.6;border:1.5px solid var(--border);background:var(--s2);color:var(--muted);margin-bottom:16px;}
.mbox.ok{border-color:rgba(52,211,153,.4);color:var(--ok);}
.mbox.no{border-color:rgba(248,113,113,.3);color:var(--warn);}
.mc{background:rgba(52,211,153,.13);color:var(--ok);padding:1px 6px;border-radius:4px;font-size:11px;font-weight:700;font-family:monospace;}
.qty-row{display:flex;align-items:center;justify-content:space-between;background:var(--s2);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:12px;}
.qty-lbl{font-size:13px;color:var(--muted);font-weight:500;}
.qc{display:flex;align-items:center;}
.qbtn{width:30px;height:30px;border:1.5px solid var(--border);background:var(--s1);color:var(--text);font-size:17px;cursor:pointer;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:background .1s;}
.qbtn:hover{background:var(--border);}
.qnum{width:42px;text-align:center;font-size:17px;font-weight:700;background:none;border:none;color:var(--text);outline:none;font-family:inherit;}
.abtn{width:100%;padding:13px;background:var(--accent);border:none;border-radius:var(--r);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .13s;}
.abtn:hover{background:#6a5ee0;transform:translateY(-1px);}
.rhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
.rhead-l{display:flex;align-items:center;gap:8px;}
.rhead-l h2{font-size:15px;font-weight:700;}
.badge{background:rgba(124,111,253,.2);color:var(--accent2);font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
.rbtns{display:flex;gap:6px;flex-wrap:wrap;}
.rbtn{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .12s;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.rbtn-ghost{background:none;border:1.5px solid var(--border);color:var(--muted);}
.rbtn-ghost:hover{border-color:var(--accent2);color:var(--text);}
.rbtn-green{background:rgba(52,211,153,.1);border:1.5px solid rgba(52,211,153,.3);color:var(--ok);}
.rbtn-green:hover{background:rgba(52,211,153,.2);}
.rbtn-red{background:none;border:1.5px solid rgba(248,113,113,.2);color:var(--warn);}
.rbtn-red:hover{background:rgba(248,113,113,.08);}
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-ico{font-size:32px;margin-bottom:10px;opacity:.3;}
.empty p{font-size:13px;line-height:2;}
.items{display:flex;flex-direction:column;gap:7px;}
.card{background:var(--s1);border:1.5px solid var(--border);border-radius:var(--r);padding:14px 16px;display:grid;grid-template-columns:28px 1fr auto 30px;align-items:center;gap:12px;animation:fu .18s ease;}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.card:hover{border-color:rgba(124,111,253,.5);}
.cnum{width:28px;height:28px;background:var(--s2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);font-weight:700;flex-shrink:0;}
.cname{font-size:14px;font-weight:600;margin-bottom:5px;}
.ctags{display:flex;flex-wrap:wrap;gap:4px;}
.tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700;}
.tcode{background:rgba(124,111,253,.15);color:var(--accent2);font-family:monospace;}
.tbar{background:rgba(52,211,153,.1);color:var(--ok);font-family:monospace;}
.topt{background:var(--s2);color:#888;}
.tnone{background:rgba(248,113,113,.1);color:var(--warn);}
.cqty{font-size:20px;font-weight:700;text-align:right;white-space:nowrap;}
.cqty span{font-size:10px;color:var(--muted);font-weight:400;}
.cdel{width:30px;height:30px;border:none;background:none;color:var(--muted);cursor:pointer;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .12s;}
.cdel:hover{background:rgba(248,113,113,.15);color:var(--warn);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--s2);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(max-width:900px){.layout{grid-template-columns:1fr;}.panel{border-right:none;border-bottom:1px solid var(--border);}}
</style>
</head>
<body>
<div class="hd">
  <div class="hd-icon">&#128230;</div>
  <div><div class="hd-title">패킹리스트 / 装箱单</div><div class="hd-sub">그로잉업 · 출고 작업용</div></div>
  <div class="hd-date">
    <label class="date-lbl">선적일 / 装运日期</label>
    <div class="date-row">
      <div class="cal-wrap" onclick="document.getElementById('ship-date').showPicker()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <input type="date" id="ship-date" class="date-input-hidden">
        <span id="ship-date-display" class="date-display">날짜 선택</span>
      </div>
      <input type="text" id="ship-date-text" class="date-input-text" placeholder="직접 입력">
    </div>
  </div>
</div>
<div class="layout">
  <div class="panel">
    <div class="ptitle">제품 선택</div>
    <div id="pgrid"></div>
  </div>
  <div class="panel">
    <div class="ptitle">옵션 선택</div>
    <div id="opt"><div class="opt-empty"><span style="font-size:28px;opacity:.3">&#128072;</span><br>왼쪽에서 제품을 선택하세요</div></div>
  </div>
  <div class="panel">
    <div class="rhead">
      <div class="rhead-l"><h2>패킹리스트</h2><span class="badge" id="badge">0건</span></div>
      <div class="rbtns">
        <button class="rbtn rbtn-ghost" onclick="expCSV()">CSV</button>
        <button class="rbtn rbtn-green" onclick="expXlsx()">엑셀 저장</button>
        <button class="rbtn rbtn-red" onclick="clearAll()">전체 삭제</button>
      </div>
    </div>
    <div id="list"><div class="empty"><div class="empty-ico">&#x1F4CB;</div><p>제품을 선택하고<br>추가해보세요</p></div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

function addEx(t){
  if(!cur)return;
  var inp=document.getElementById(t==="color"?"ci-c":"ci-s");
  var v=inp.value.trim(); if(!v)return;
  if(t==="color"){if(exC.indexOf(v)<0)exC.push(v);sc=v;renderCC();}
  else{if(exS.indexOf(v)<0)exS.push(v);ss=v;renderCS();}
  inp.value=""; renderMatch();
}
function nrm(s){return(s||"").replace(/[\s\-_&]/g,"").toLowerCase();}
function findM(){
  if(!cur)return[];
  return DB.filter(function(row){
    var nm=nrm(row.name),opt=nrm(row.option);
    var nok=nrm(cur.dbName).split(" ").every(function(k){return nm.indexOf(k)>=0;});
    var cok=!sc||sc==="기본"||opt.indexOf(nrm(sc))>=0;
    var sok=!ss||ss==="FREE"||opt.indexOf(nrm(ss))>=0;
    return nok&&cok&&sok;
  });
}
function renderMatch(){

  if(m.length===0){box.className="mbox no";box.textContent="일치하는 상품 없음";}
  else if(m.length===1){box.className="mbox ok";box.innerHTML='✓ <span class="mc">'+m[0].code+'</span>&nbsp;&nbsp;'+m[0].name+' '+m[0].option+'&nbsp;&nbsp;<span class="mc">'+m[0].barcode+'</span>';}
  else{box.className="mbox ok";box.innerHTML='✓ '+m.length+'개 일치 &nbsp;'+m.slice(0,2).map(function(x){return'<span class="mc">'+x.code+'</span>';}).join(" ")+(m.length>2?" …":"");}
}
function chgQ(d){var i=document.getElementById("qty");if(i)i.value=Math.max(1,(parseInt(i.value)||1)+d);}
function addItem(){
  if(!cur){showToast("제품을 선택해주세요");return;}
  if(!sc){showToast("색상을 선택해주세요");return;}
  if(!ss){showToast("사이즈를 선택해주세요");return;}
  var q=parseInt((document.getElementById("qty")||{value:1}).value)||1;
  var m=findM();
  items.push({id:++uid,label:cur.label,group:cur.g,color:sc,size:ss,qty:q,code:m[0]?m[0].code:"",barcode:m[0]?m[0].barcode:""});
  renderList(); showToast("추가했습니다 ✓");
}
function renderList(){
  document.getElementById("badge").textContent=items.length+"건";
  var el=document.getElementById("list");
  if(!items.length){el.innerHTML='<div class="empty"><div class="empty-ico">&#x1F4CB;</div><p>제품을 선택하고<br>추가해보세요</p></div>';return;}
  var h='<div class="items">';
  items.forEach(function(it,i){
    h+='<div class="card"><div class="cnum">'+(i+1)+'</div><div><div class="cname">'+it.label+' · '+it.color+' · '+it.size+'</div><div class="ctags">';
    h+=it.code?'<span class="tag tcode">'+it.code+'</span>':'<span class="tag tnone">코드없음</span>';
    if(it.barcode)h+='<span class="tag tbar">'+it.barcode+'</span>';
    h+='<span class="tag topt">'+it.group+'</span></div></div><div class="cqty">'+it.qty+'<span> 개</span></div><button class="cdel" onclick="delItem('+it.id+')">✕</button></div>';
  });
  h+='</div>'; el.innerHTML=h;
}
function delItem(id){items=items.filter(function(x){return x.id!==id;});renderList();}
function clearAll(){if(!items.length)return;if(confirm("전체 항목을 삭제할까요?")){items=[];renderList();}}
function expCSV(){
  if(!items.length){showToast("항목을 먼저 추가해주세요");return;}
  var shipDate=document.getElementById("ship-date").value||document.getElementById("ship-date-text").value||"";
  var rows=["선적일:"+shipDate,"번호,상품코드,바코드,제품명,색상,사이즈,수량"];
  items.forEach(function(it,i){rows.push([i+1,it.code,it.barcode,it.label,it.color,it.size,it.qty].join(","));});
  var csv="\uFEFF"+rows.join("\r\n");
  var a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"})); a.download="패킹리스트.csv"; a.click();
  showToast("CSV 저장 완료");
}
function expXlsx(){
  if(!items.length){showToast("항목을 먼저 추가해주세요");return;}
  var shipDate=document.getElementById("ship-date").value||document.getElementById("ship-date-text").value||"";
  var data=[["선적일 / 装运日期", shipDate],["번호","상품코드","바코드","제품명","색상","사이즈","수량"]];
  items.forEach(function(it,i){data.push([i+1,it.code,it.barcode,it.label,it.color,it.size,it.qty]);});
  var wb=XLSX.utils.book_new(); var ws=XLSX.utils.aoa_to_sheet(data);
  ws["!cols"]=[{wch:5},{wch:12},{wch:22},{wch:16},{wch:12},{wch:10},{wch:6}];
  XLSX.utils.book_append_sheet(wb,ws,"패킹리스트"); XLSX.writeFile(wb,"패킹리스트.xlsx");
  showToast("엑셀 저장 완료");
}
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2000);}
init();
</script>
